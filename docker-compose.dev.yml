version: "3.8"

# Development override — hot reload via volume mounts.
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Both services mount their source directory and run the dev server instead
# of serving a production build, so every file save triggers a live reload.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: sora-backend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules       # anonymous volume keeps container node_modules isolated
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
      - CORS_ORIGIN=http://localhost:5173
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: sora-frontend-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules       # anonymous volume keeps container node_modules isolated
    ports:
      - "80:5173"
    environment:
      - VITE_API_TARGET=http://backend:3000
    depends_on:
      - backend
    restart: unless-stopped
